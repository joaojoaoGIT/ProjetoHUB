<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador de Cofre</title>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="app">
    <div class="container">

      <h1>🏦 Simulador de Cofre</h1>

      <div class="card">
        <p class="label">Saldo no cofre</p>

        <div>
          <span class="saldo-valor" id="saldo-display">R$ 0,00</span>
        </div>

        <p class="total-moedas" id="total-moedas">0 moedas</p>

        <div class="cofre-area">

          <div id="coin-stage"></div>

          <svg id="cofre-svg" width="150" height="155" viewBox="0 0 130 140" xmlns="http://www.w3.org/2000/svg">

            <defs>
              <clipPath id="clip-cofre">
                <rect x="12" y="22" width="106" height="92" rx="10"/>
              </clipPath>
            </defs>

            <rect x="12" y="22" width="106" height="92" rx="10"
              fill="#D3D1C7"
              stroke="#888780"
              stroke-width="1.5"/>

            <rect id="cofre-enchimento"
              x="12"
              y="114"
              width="106"
              height="0"
              fill="#1D9E75"
              opacity="0.55"
              clip-path="url(#clip-cofre)"/>

            <rect x="12" y="22" width="106" height="92" rx="10"
              fill="none"
              stroke="#888780"
              stroke-width="1.5"/>

            <rect x="24" y="32" width="82" height="60" rx="8"
              fill="#B4B2A9"
              stroke="#888780"
              stroke-width="1"/>

            <circle cx="65" cy="62" r="20"
              fill="#D3D1C7"
              stroke="#888780"
              stroke-width="1.2"/>

            <circle cx="65" cy="62" r="12"
              fill="#B4B2A9"
              stroke="#888780"
              stroke-width="1"/>

            <line
              x1="65"
              y1="50"
              x2="65"
              y2="62"
              stroke="#5F5E5A"
              stroke-width="2.5"
              stroke-linecap="round"
              id="ponteiro"
            />

            <circle cx="65" cy="62" r="3" fill="#444441"/>

            <rect x="44" y="102" width="42" height="7" rx="3.5" fill="#888780"/>
            <rect x="10" y="114" width="110" height="10" rx="5" fill="#5F5E5A"/>
            <rect x="56" y="19" width="18" height="9" rx="3" fill="#5F5E5A"/>
            <rect x="59" y="13" width="12" height="9" rx="2" fill="#888780"/>
            <rect x="4" y="50" width="8" height="24" rx="4" fill="#5F5E5A"/>
            <rect x="118" y="50" width="8" height="24" rx="4" fill="#5F5E5A"/>

          </svg>
        </div>
      </div>

      <div class="card">

        <p class="label">Inserir moeda</p>

        <div class="moedas-grid">

          <button class="btn-moeda" onclick="adicionarMoeda(10, this)">
            <div class="moeda-icon moeda-10">10¢</div>
            <span class="moeda-label">R$ 0,10</span>
            <span class="moeda-count" id="c10">0×</span>
          </button>

          <button class="btn-moeda" onclick="adicionarMoeda(25, this)">
            <div class="moeda-icon moeda-25">25¢</div>
            <span class="moeda-label">R$ 0,25</span>
            <span class="moeda-count" id="c25">0×</span>
          </button>

          <button class="btn-moeda" onclick="adicionarMoeda(50, this)">
            <div class="moeda-icon moeda-50">50¢</div>
            <span class="moeda-label">R$ 0,50</span>
            <span class="moeda-count" id="c50">0×</span>
          </button>

          <button class="btn-moeda" onclick="adicionarMoeda(100, this)">
            <div class="moeda-icon moeda-100">
              <span class="inner-ring"></span>
              <span style="position:relative;z-index:1;">R$1</span>
            </div>

            <span class="moeda-label">R$ 1,00</span>
            <span class="moeda-count" id="c100">0×</span>
          </button>

        </div>
      </div>

      <div class="card">

        <p class="label">Operações</p>

        <div class="sacar-row">
          <input
            type="number"
            id="valor-saque"
            placeholder="Valor para sacar (ex: 1.50)"
            min="0.01"
            step="0.01"
          />
        </div>

        <div class="acoes">
          <button class="btn-sacar" onclick="sacar()">💸 Sacar</button>
          <button class="btn-esvaziar" onclick="esvaziar()">🗑️ Esvaziar</button>
        </div>

        <p class="msg" id="mensagem"></p>

      </div>

    </div>
  </div>

  <script src="js/script.js"></script>

</body>
</html>
