<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>X VIDEO-GAMES</title>
</head>

<body>

    <header class="header">

        <div class="header-content">

            <div class="logo">
                <a href="index.html">
                    <img src="assets/img/logo.png" alt="VIDEO-GAMES" class="brand-logo">
                </a>
            </div>

            <div class="header-actions">
                <div class="header-stats">

                    <div class="stat-item">
                        <span class="label">Saldo</span>
                        <span class="value">
                            R$ <span id="saldo">2000.00</span>
                        </span>
                    </div>

                    <div class="stat-item">
                        <span class="label">Ganhos</span>
                        <span class="value wins">
                            R$ <span id="ganhos">0</span>
                        </span>
                    </div>

                    <div class="stat-item">
                        <span class="label">Perdas</span>
                        <span class="value losses">
                            R$ <span id="perdas">0</span>
                        </span>
                    </div>

                </div>

            </div>

        </div>

    </header>

    <main>

        <div class="container">

            <!-- DADOS -->
            <div class="game-panel">

                <h2>Resultado</h2>

                <div class="dice-table">

                    <div class="player-card">

                        <h3>Dado Sorteado</h3>

                        <img
                            id="dice-player"
                            src="assets/img/png1.com.png"
                            alt="Dado Sorteado"
                        >

                        <p id="status-player"></p>

                    </div>

                </div>

            </div>

            <!-- APOSTAS -->
            <div class="betting-panel">

                <h2>Nova Aposta</h2>

                <div class="betting-section">

                    <div class="choose-number">

                        <label>Selecione o Número</label>

                        <div class="number-buttons">

                            <button class="number-btn" data-number="1">1</button>
                            <button class="number-btn" data-number="2">2</button>
                            <button class="number-btn" data-number="3">3</button>
                            <button class="number-btn" data-number="4">4</button>
                            <button class="number-btn" data-number="5">5</button>
                            <button class="number-btn" data-number="6">6</button>

                        </div>

                        <p id="chosen-number">
                            Nenhum número escolhido
                        </p>

                    </div>

                    <div class="bet-amount">

                        <label>Valor da Aposta</label>

                        <div class="input-group">

                            <input
                                type="number"
                                id="bet-input"
                                placeholder="0.00"
                            >

                            <span class="currency">R$</span>

                        </div>

                        <div class="quick-bets">

                            <button class="quick-bet-btn" data-amount="10">
                                R$ 10
                            </button>

                            <button class="quick-bet-btn" data-amount="25">
                                R$ 25
                            </button>

                            <button class="quick-bet-btn" data-amount="50">
                                R$ 50
                            </button>

                            <button
                                id="bet-all-button"
                                class="quick-bet-btn all"
                            >
                                Tudo
                            </button>

                        </div>

                    </div>

                </div>

                <button id="roll-button" class="roll-button">
                    Lançar Dados
                </button>

                <p id="message" class="message">
                    Escolha um número e faça sua aposta.
                </p>

                <div class="history-panel">
                    <h3>Histórico de Apostas</h3>
                    <div id="history-list" class="history-list">
                        <p class="empty-state">Nenhuma aposta registrada ainda.</p>
                    </div>
                </div>

            </div>

        </div>

    </main>

    <div id="deposit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Fazer Depósito</h2>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="deposit-methods">
                    <button class="method-btn selected" data-method="cartao">💳 Cartão</button>
                    <button class="method-btn" data-method="pix">📱 PIX</button>
                    <button class="method-btn" data-method="boleto">📋 Boleto</button>
                </div>
                <div class="deposit-form">
                    <label>Valor do Depósito</label>
                    <div class="amount-input-group">
                        <input type="number" id="deposit-amount" placeholder="0.00" min="10" step="0.01">
                        <span class="currency">R$</span>
                    </div>
                    <div class="quick-amounts">
                        <button class="quick-amount" data-amount="50">R$ 50</button>
                        <button class="quick-amount" data-amount="100">R$ 100</button>
                        <button class="quick-amount" data-amount="250">R$ 250</button>
                        <button class="quick-amount" data-amount="500">R$ 500</button>
                    </div>
                    <div class="deposit-info">
                        <p><strong>Valor total:</strong> R$ <span id="total-amount">0.00</span></p>
                        <p class="fee">Sem taxa de depósito</p>
                    </div>
                    <button id="confirm-deposit" class="confirm-btn">Confirmar Depósito</button>
                    <p class="modal-message" id="modal-message"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/dados.js"></script>

</body>

</html>
