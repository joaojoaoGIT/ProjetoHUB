<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Teclado Musical Virtual</title>
  <meta name="description" content="Teclado musical virtual com múltiplos instrumentos e gravação." />
  <link rel="stylesheet" href="style.css" />
  <!-- WebAudioFont via CDN -->
  <script src="https://cdn.jsdelivr.net/gh/surikov/webaudiofont@master/npm/dist/WebAudioFontPlayer.js"></script>
</head>
<body>
  <header>
    <h1>Neon Keys</h1>
    <p>TECLADO MUSICAL VIRTUAL</p>
  </header>

  <section class="controls">
    <div class="control-group">
      <label for="instrument">Instrumento</label>
      <select id="instrument"></select>
    </div>
    <div class="control-group">
      <button id="recordBtn">● Gravar</button>
      <button id="playBtn" disabled>▶ Reproduzir</button>
      <button id="clearBtn" disabled>✕ Limpar</button>
    </div>
  </section>

  <section class="keyboard-wrap">
    <div class="keyboard" id="keyboard"></div>
  </section>

  <section class="recording-panel">
    <h3>Notas Gravadas</h3>
    <div class="recorded-notes" id="recordedNotes"></div>
    <div class="status" id="status"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
