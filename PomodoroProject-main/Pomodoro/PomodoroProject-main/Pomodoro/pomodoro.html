<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pomodoro.css">
    <title>Pomodoro</title>
</head>

<body>
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="assets/PixVerse_V6_Image_Text_540P_anime_ele_mexendo_.mp4" type="video/mp4">
        Seu navegador não suporta o elemento de vídeo.
    </video>
    <header>
        <h1>Pomodoro</h1>
        <h2>Bem-vindo ao cronômetro Pomodoro</h2>
    </header>
    
    <div class="cronometro">
        <div class="painel">
            <div class="status">
                <span id="fase">Foco</span>
                <button id="toggleTema" class="tema">Modo Noturno</button>
            </div>
            <h3 id="tempo">25:00</h3>
            <div class="botoes">
                <button id="iniciar">Iniciar</button>
                <button id="pausar">Pausar</button>
                <button id="resetar">Resetar</button>
            </div>
            <button id="configurar" class="configurar">Configurar tempo</button>
            <div id="configuracoes" class="configuracoes">
                <label for="tempoTrabalho">Tempo de Trabalho (minutos):</label>
                <input type="number" id="tempoTrabalho" value="25" min="1">
                <label for="tempoDescanso">Tempo de Descanso (minutos):</label>
                <input type="number" id="tempoDescanso" value="5" min="1">
                <button id="salvarConfig">Salvar configurações</button>
            </div>
        </div>
    </div>
    <script src="pomodoro.js"></script>
</body>
</html>

</html>
